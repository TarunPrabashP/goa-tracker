<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🏖️ Goa Trip Tracker - Pro Edition</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

  <style>
    /* ==========================================================================
       1. CSS VARIABLES & BASE STYLES
       ========================================================================== */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    :root {
      --primary: #10b981; --danger: #ef4444; --warning: #f59e0b;
      --info: #3b82f6; --ocean: #0ea5e9;
      --bg-gradient: linear-gradient(135deg, #1e1e2f 0%, #0f172a 100%);
      --surface: rgba(30, 30, 46, 0.95); --card-bg: #27273a;
      --text-main: #f8fafc; --text-muted: #94a3b8; --border: #3f3f5a;
    }

    body.light-mode {
      --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      --surface: rgba(255, 255, 255, 0.95); --card-bg: #ffffff;
      --text-main: #1e293b; --text-muted: #64748b; --border: #cbd5e1;
    }

    body { font-family: 'Inter', sans-serif; background: var(--bg-gradient); height: 100vh; overflow: hidden; color: var(--text-main); display: flex; flex-direction: column; padding: 16px; gap: 16px; transition: background 0.4s ease; }
    h1, h2, h3, .total-value, .budget-val, .exp-amt { font-family: 'Plus Jakarta Sans', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.4); border-radius: 10px; }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

    /* ==========================================================================
       2. HEADER
       ========================================================================== */
    .premium-header { background: var(--surface); backdrop-filter: blur(12px); border-radius: 24px; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.15); flex-shrink: 0; border: 1px solid var(--border); z-index: 10; }
    .ph-left { display: flex; align-items: center; gap: 16px; }
    .ph-title { font-size: 1.5rem; font-weight: 800; margin: 0; display: flex; align-items: center; gap: 8px;}
    .ph-theme-btn { background: var(--card-bg); border: 1px solid var(--border); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; color: var(--text-main); transition: 0.2s;}
    
    .ph-right { display: flex; align-items: center; gap: 32px; }
    .ph-stat { display: flex; flex-direction: column; align-items: flex-end; }
    .ph-label { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap:4px; }
    .ph-val { font-family: 'JetBrains Mono', monospace; font-size: 1.4rem; font-weight: 800; color: var(--info); margin-top: 2px; }
    .ph-val.total { color: var(--danger); }
    .ph-val.dist { color: var(--warning); }
    
    .burn-container { width: 150px; text-align: right; margin-top: 4px;}
    .burn-bar { width: 100%; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .burn-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.4s ease; }
    
    .sidebar-btn { background: var(--ocean); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 700; font-family: 'Plus Jakarta Sans'; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4); transition: 0.2s; }

    /* ==========================================================================
       3. DASHBOARD GRID & SIDEBAR
       ========================================================================== */
    .dashboard-grid { display: grid; grid-template-columns: 300px 1fr 380px; gap: 16px; flex: 1; overflow: hidden; }
    .col-left, .col-center, .col-right { display: flex; flex-direction: column; gap: 16px; height: 100%; overflow: hidden; }
    .panel { background: var(--surface); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid var(--border); display: flex; flex-direction: column; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
    .panel-header { padding: 16px 20px; font-weight: 800; font-size: 1.05rem; border-bottom: 1px solid var(--border); background: var(--card-bg); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;}
    .scroll-area { flex: 1; overflow-y: auto; padding: 20px; }

    .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); z-index: 99998; backdrop-filter: blur(4px);}
    .sidebar { position: fixed; top: 0; right: -450px; width: 420px; height: 100vh; background: var(--surface); z-index: 99999; transition: right 0.3s ease; box-shadow: -10px 0 40px rgba(0,0,0,0.3); display: flex; flex-direction: column; border-left: 1px solid var(--border);}
    .sidebar.open { right: 0; }
    .sidebar-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--card-bg);}
    
    /* ==========================================================================
       4. CALENDAR & BUDGET
       ========================================================================== */
    .calendar-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; font-weight: 800; }
    .calendar-nav button { background: transparent; color: var(--text-main); border: 1px solid var(--border); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;}
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; background: var(--card-bg); padding: 8px; border-radius: 12px; border: 1px solid var(--border);}
    .cal-day-header { font-size: 0.65rem; color: var(--text-muted); font-weight: 800; padding: 4px 0; text-transform: uppercase;}
    .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 6px; font-size: 0.85rem; font-weight: 500; cursor: pointer; position: relative; }
    .cal-day:hover:not(.empty) { background: var(--surface); box-shadow: inset 0 0 0 1px var(--ocean); }
    .cal-day.empty { cursor: default; }
    .cal-day.today { font-weight: 800; color: var(--ocean); box-shadow: inset 0 -3px 0 0 var(--ocean); background: rgba(14, 165, 233, 0.05); }
    .cal-day.selected { background: var(--ocean) !important; color: white !important; font-weight: 700;}
    .cal-day.has-expense::after { content: ''; width: 4px; height: 4px; background: var(--danger); border-radius: 50%; position: absolute; bottom: 4px;}

    .budget-item { display: grid; grid-template-columns: 1fr auto; align-items: center; padding: 14px; margin-bottom: 10px; background: var(--card-bg); border-radius: 14px; border-left: 4px solid var(--primary); border: 1px solid var(--border); cursor: pointer;}
    .budget-item.active-filter { background: var(--primary); color: white; }

    /* ==========================================================================
       5. MAP, GALLERY & HEATMAP
       ========================================================================== */
    .col-center .panel { display: flex; flex-direction: column; }
    #map-wrapper { flex: 1 1 auto; position: relative; width: 100%; min-height: 300px; background: var(--card-bg); overflow: hidden; }
    #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    
    .view-toggle { display: flex; background: var(--card-bg); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; }
    .view-toggle button { background: transparent; color: var(--text-muted); border: none; padding: 8px 16px; font-size: 0.8rem; font-weight: 700; cursor: pointer;}
    .view-toggle button.active { background: var(--ocean); color: white; }
    
    .btn-action-map { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px;}

    /* Custom Leaflet Tooltip for Dynamic Pins */
    .leaflet-tooltip.custom-tooltip { background: rgba(0,0,0,0.8); color: white; border: none; font-weight: bold; border-radius: 6px; }

    /* ==========================================================================
       6. TABBED RIGHT PANEL (FORM VS OVERVIEW)
       ========================================================================== */
    .tabs-header { display: flex; gap: 8px; width: 100%; }
    .tab-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text-muted); font-weight: 700; cursor: pointer; transition: 0.2s;}
    .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary);}
    .tab-content { display: none; flex-direction: column; height: 100%; }
    .tab-content.active { display: flex; }

    /* Form Styles */
    .form-grid { display: flex; flex-direction: column; gap: 14px; margin-bottom: 16px; }
    .input-row { display: flex; gap: 12px; }
    .input, .select { padding: 12px; border: 1px solid var(--border); border-radius: 12px; font-size: 0.95rem; font-family: 'Inter'; background: var(--card-bg); color: var(--text-main); width: 100%; outline: none;}
    
    #amountWrapper { flex:1; display:flex; border: 1px solid var(--border); border-radius: 12px; background: var(--card-bg); overflow: hidden;}
    #amount { flex:1; border:none; padding:12px; background:transparent; color:var(--text-main); outline:none; min-width:0; }
    #btn-free { background: rgba(16, 185, 129, 0.1); color: var(--primary); padding: 0 16px; display: flex; align-items: center; font-weight: 800; cursor: pointer; border-left: 1px solid var(--border);}
    #btn-ocr { background: var(--info); color: white; padding: 0 16px; display: flex; align-items: center; font-weight: 800; cursor: pointer; border-left: 1px solid var(--border);}

    /* Image Upload Type Selector */
    .img-type-toggle { display: flex; gap: 8px; margin-bottom: 10px;}
    .img-type-btn { flex:1; padding: 6px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.8rem; cursor: pointer; background: var(--card-bg); color: var(--text-muted); font-weight:bold;}
    .img-type-btn.active { background: var(--ocean); color: white; }

    #photoPreviewContainer { display: none; gap: 10px; overflow-x: auto; margin-bottom: 14px; padding-bottom: 6px; }
    
    /* Data Overview Tab Styles */
    .overview-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 0.85rem; }
    .overview-table th { background: var(--card-bg); text-align: left; padding: 10px; border-bottom: 2px solid var(--border); color: var(--text-muted); }
    .overview-table td { padding: 10px; border-bottom: 1px solid var(--border); }
    
    .carousel-wrapper { width: 100%; overflow-x: auto; display: flex; gap: 12px; padding-bottom: 10px; }
    .carousel-item { flex: 0 0 120px; height: 120px; border-radius: 12px; overflow: hidden; position: relative; border: 1px solid var(--border); cursor: pointer;}
    .carousel-item img { width: 100%; height: 100%; object-fit: cover; }
    .carousel-label { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); color: white; font-size: 0.7rem; padding: 4px; text-align: center; }

    /* Feed Layout */
    .expense-item { padding: 16px; background: var(--card-bg); border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; cursor: pointer;}
    .expense-item:hover { border-color: var(--ocean); }

    /* Lightbox & OCR Loading */
    #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); z-index: 999999; justify-content: center; align-items: center; }
    #lightbox img { max-width: 95%; max-height: 90%; border-radius: 16px; }
    #ocrLoading { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); z-index: 999999; justify-content: center; align-items: center; color: white; font-weight: bold; flex-direction: column; gap: 16px;}
    .spinner { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid white; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

  </style>
</head>
<body class="dark-mode">

  <div id="ocrLoading">
      <div class="spinner"></div>
      <div id="ocrStatus">AI Reading Receipt...</div>
  </div>

  <div id="lightbox" onclick="this.style.display='none'"><div style="position: absolute; top: 30px; right: 30px; background: rgba(255,255,255,0.2); color: white; font-size: 1.8rem; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;">✕</div><img id="lbImg" src=""></div>

  <div class="premium-header">
    <div class="ph-left">
      <h1 class="ph-title"><i class="ph-fill ph-beach-tent" style="color:var(--ocean)"></i> Goa Trip</h1>
      <button class="ph-theme-btn" onclick="toggleTheme()" id="themeBtn"><i class="ph-fill ph-sun"></i></button>
    </div>
    <div class="ph-right">
      <div class="ph-stat">
        <div class="ph-label">Budget Burn <i class="ph-bold ph-pencil-simple" style="cursor:pointer;" onclick="setBudget()"></i></div>
        <div style="font-size:0.8rem; font-weight:800; color:var(--text-main); margin-top:2px;" id="burnText">0%</div>
        <div class="burn-container"><div class="burn-bar"><div class="burn-fill" id="burnBar"></div></div></div>
      </div>
      <div class="ph-stat">
        <div class="ph-label" id="filterLabel">Total Spent</div>
        <div class="ph-val total" id="totalSpent">₹0</div>
      </div>
      <button class="sidebar-btn" onclick="toggleSidebar()"><i class="ph-bold ph-layout"></i> Feed & Sync</button>
    </div>
  </div>

  <div class="dashboard-grid">
    <div class="col-left">
      <div class="panel" style="flex: 0 0 auto;">
        <div class="panel-header">
            <span><i class="ph-bold ph-calendar-blank"></i> Timeline</span>
            <div style="display:flex; gap:8px;">
                <div class="calendar-nav" style="margin:0;"><button onclick="changeMonth(-1)"><i class="ph-bold ph-caret-left"></i></button></div>
                <div class="calendar-nav" style="margin:0;"><button onclick="changeMonth(1)"><i class="ph-bold ph-caret-right"></i></button></div>
            </div>
        </div>
        <div style="padding:16px;">
            <div class="calendar-month" id="calendarMonth" style="text-align:center; font-weight:800; font-size:1.1rem; margin-bottom:12px;"></div>
            <div class="calendar-grid" id="calendar"></div>
        </div>
      </div>

      <div class="panel" style="flex: 1;">
        <div class="panel-header">
            <span><i class="ph-bold ph-chart-pie-slice"></i> Analytics</span>
            <span style="font-size:0.75rem; color:var(--text-muted); cursor:pointer; display:flex; align-items:center; gap:4px;" onclick="toggleCategoryFilter(null)"><i class="ph-bold ph-arrows-clockwise"></i> Reset Filters</span>
        </div>
        <div class="scroll-area" style="display: flex; flex-direction: column; gap: 16px;">
            <div style="font-size:0.7rem; text-align:center; color:var(--text-muted);">*Click a slice to filter map*</div>
            <div style="position: relative; height: 180px; width: 100%; flex-shrink: 0;">
                <canvas id="expenseChart"></canvas>
            </div>
            <div id="budgetBreakdownList"></div>
        </div>
      </div>
    </div>

    <div class="col-center">
      <div class="panel" style="flex: 1; padding: 0;">
        <div class="panel-header">
            <span style="display:flex; align-items:center; gap:8px;"><i class="ph-bold ph-map-trifold"></i> Live View</span>
            <div style="display:flex; gap: 8px;">
                <button class="btn-action-map" id="btn-heatmap" onclick="toggleHeatmap()"><i class="ph-bold ph-fire"></i> Heatmap</button>
                <button class="btn-action-map" style="background:var(--info); color:white;" onclick="exportMap()"><i class="ph-bold ph-camera"></i> Snapshot</button>
            </div>
        </div>
        <div id="map-wrapper">
            <div id="map"></div>
        </div>
      </div>
    </div>

    <div class="col-right">
      <div class="panel" style="flex: 1; display: flex; flex-direction: column;">
        <div class="panel-header" style="padding: 10px;">
            <div class="tabs-header">
                <button class="tab-btn active" id="btn-tab-add" onclick="switchRightTab('add')"><i class="ph-bold ph-plus-circle"></i> Log Event</button>
                <button class="tab-btn" id="btn-tab-overview" onclick="switchRightTab('overview')"><i class="ph-bold ph-chart-bar"></i> Overview</button>
            </div>
        </div>
        
        <div class="scroll-area tab-content active" id="tab-add">
            <div class="form-grid">
              <input type="text" id="description" class="input" placeholder="Title (e.g. Fish Thali, Surfboard)">
              
              <div class="input-row">
                <div id="amountWrapper">
                    <input type="number" id="amount" placeholder="Amount (₹)">
                    <div id="btn-free" onclick="toggleFree()">Free</div>
                    <div id="btn-ocr" onclick="document.getElementById('ocrInput').click()" title="Scan Receipt"><i class="ph-bold ph-scan"></i></div>
                    <input type="file" id="ocrInput" accept="image/*" style="display:none;" onchange="handleOCR(event)">
                </div>
                <select id="category" class="select" style="flex:1;">
                  <option value="">Category...</option>
                  <option value="🏨 Accommodation">🏨 Accommodation</option>
                  <option value="🍔 Food & Drinks">🍔 Food & Drinks</option>
                  <option value="🚗 Transport">🚗 Transport</option>
                  <option value="🎢 Activities">🎢 Activities</option>
                  <option value="🛍️ Shopping">🛍️ Shopping</option>
                  <option value="📱 Other">📱 Other</option>
                </select>
              </div>

              <div class="input-row" id="paidByRow">
                  <select id="paidBy" class="select" style="flex:1;"></select>
                  <button class="action-badge" style="background:var(--card-bg); border:1px solid var(--border); color:var(--text-main);" onclick="editPayers()">Edit Names</button>
              </div>

              <div class="input-row" style="align-items:center;">
                  <input type="date" id="dateInput" class="input" style="flex: 1;" required>
                  <input type="time" id="timeInput" class="input" style="flex: 1;" value="12:00">
              </div>

              <div class="img-type-toggle">
                  <button class="img-type-btn active" id="type-memory" onclick="setPhotoType('memory')"><i class="ph-bold ph-camera"></i> Memory Photo</button>
                  <button class="img-type-btn" id="type-receipt" onclick="setPhotoType('receipt')"><i class="ph-bold ph-receipt"></i> Receipt/Bill</button>
              </div>
              <button class="action-badge" style="width:100%; justify-content:center; padding:12px; background:var(--card-bg); border:1px dashed var(--border); color:var(--text-main);" onclick="document.getElementById('photoInput').click()">
                  <i class="ph-bold ph-plus"></i> Select Images
              </button>
              <input type="file" id="photoInput" accept="image/*" multiple style="display:none;">

              <div style="position: relative;">
                <div class="input-row">
                  <input type="text" id="place" class="input" placeholder="Location Name..." oninput="searchLocation(this.value)" style="flex:1;">
                  <button class="action-badge btn-gps" onclick="pinCurrentLocation()"><i class="ph-bold ph-crosshair"></i> GPS</button>
                </div>
                <div id="locationSuggestions" style="position: absolute; top: 100%; left: 0; right: 0; background: var(--surface); border: 2px solid var(--border); border-radius: 12px; max-height: 200px; overflow-y: auto; z-index: 1000; display: none;"></div>
              </div>

            </div>
            
            <div id="photoPreviewContainer"></div>
            <button class="btn-save" id="saveBtn" onclick="addExpense()">Save to Itinerary</button>
        </div>

        <div class="scroll-area tab-content" id="tab-overview" style="padding: 10px;">
            <h3 style="margin-bottom: 10px; font-size: 1rem;"><i class="ph-bold ph-users"></i> Split & Payer Stats</h3>
            <div id="overviewTableContainer"></div>

            <h3 style="margin: 20px 0 10px 0; font-size: 1rem;"><i class="ph-bold ph-receipt"></i> Receipts Gallery</h3>
            <div id="receiptCarousel" class="carousel-wrapper"></div>

            <h3 style="margin: 20px 0 10px 0; font-size: 1rem;"><i class="ph-bold ph-image"></i> Memories Gallery</h3>
            <div id="memoryCarousel" class="carousel-wrapper"></div>
        </div>

      </div>
    </div>
  </div>

  <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
  <div id="itinerarySidebar" class="sidebar">
      <div class="sidebar-header">
          <h2 style="margin:0; font-size:1.2rem;"><i class="ph-bold ph-list-dashes" style="color:var(--ocean)"></i> Itinerary Feed</h2>
          <button class="close-sidebar" onclick="toggleSidebar()"><i class="ph-bold ph-x"></i></button>
      </div>
      <div class="scroll-area" id="expenseList" style="padding-top: 12px;"></div>
  </div>

  <script>
    // ==========================================================================
    // 🔴 FIREBASE CLOUD SYNC LOGIC 🔴 
    // ==========================================================================
    const firebaseConfig = {
      apiKey: "AIzaSyAaYy-wZcb3GIGKGK-hj8y9_A2O4Pzw3bM",
      authDomain: "goa-34b5f.firebaseapp.com",
      databaseURL: "https://goa-34b5f-default-rtdb.firebaseio.com",
      projectId: "goa-34b5f",
      storageBucket: "goa-34b5f.firebasestorage.app",
      messagingSenderId: "931865940606",
      appId: "1:931865940606:web:2a58c8221ce26fc744be2f"
    };

    let useFirebase = false;
    let tripRef = null;

    if (Object.keys(firebaseConfig).length > 0 && firebaseConfig.apiKey) {
        try {
            firebase.initializeApp(firebaseConfig);

        } catch(e) { console.error("Firebase init failed", e); }
    }

    // ==========================================================================

    // ==========================================================================
    let expenses = [];
    let tripBudget = 25000;
    
    let payers = ['Tarun', 'Neha', 'Ashok', 'Rupini', 'Tejas'];
    try {
        let p = localStorage.getItem('goaPayers');
        if (p && p !== 'undefined') { let parsed = JSON.parse(p); if (Array.isArray(parsed) && parsed.length > 1) payers = parsed; }
    } catch(e) {}
    localStorage.setItem('goaPayers', JSON.stringify(payers));
    
    let currentMonth = new Date().getMonth(); let currentYear = new Date().getFullYear();
    let selectedDate = null; let activeCategoryFilter = null;
    let searchTimeout = null; let selectedLocation = null;
    let editingId = null; 
    let map = null; let markersCluster = null; let heatLayer = null; let routeLayer = null;
    let isHeatmap = false;
    
    // Arrays for multiple photos: array of objects {url: b64, type: 'receipt'|'memory'}
    let currentPhotos = []; 
    let currentPhotoUploadType = 'memory'; 
    let isFree = false; 

    if (useFirebase) {
        tripRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                expenses = data.expenses || [];
                tripBudget = data.budget || 25000;
                if (data.payers && data.payers.length > 0 && data.payers[0] !== 'Me') payers = data.payers;
                renderPayers(); renderAll();
            } else { renderPayers(); renderAll(); }
        });
    } else {
        try {
            let saved = localStorage.getItem('goaExpenses');
            if(saved && saved !== 'undefined') expenses = JSON.parse(saved);
            tripBudget = parseFloat(localStorage.getItem('goaBudget')) || 25000;
        } catch(e) { console.warn("Local storage reset."); }
    }

    function saveData() { 
        if (useFirebase && tripRef) {
            tripRef.set({ expenses: expenses, budget: tripBudget, payers: payers });
        } else {
            localStorage.setItem('goaExpenses', JSON.stringify(expenses));
            localStorage.setItem('goaBudget', tripBudget);
            localStorage.setItem('goaPayers', JSON.stringify(payers));
            renderAll(); 
        }
    }

    // ==========================================================================
    // INITIALIZATION
    // ==========================================================================
    function init() {
      if(localStorage.getItem('goaTheme') === 'light') {
          document.body.classList.replace('dark-mode', 'light-mode');
          document.getElementById('themeBtn').innerHTML = '<i class="ph-fill ph-moon"></i>';
      }

      const now = new Date();
      let h = String(now.getHours()).padStart(2, '0'); let m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('timeInput').value = `${h}:${m}`;
      
      const offset = now.getTimezoneOffset() * 60000;
      document.getElementById('dateInput').value = (new Date(now.getTime() - offset)).toISOString().split('T')[0];

      renderPayers();
      initMap(); 
      setupPhotoHandler();
      renderAll(); 
      
      [100, 500, 1000].forEach(t => setTimeout(() => { if(map) { map.invalidateSize(true); updateMap(); } }, t));
    }
    
    function toggleTheme() {
        if(document.body.classList.contains('dark-mode')) {
            document.body.classList.replace('dark-mode', 'light-mode');
            localStorage.setItem('goaTheme', 'light');
            document.getElementById('themeBtn').innerHTML = '<i class="ph-fill ph-moon"></i>';
        } else {
            document.body.classList.replace('light-mode', 'dark-mode');
            localStorage.setItem('goaTheme', 'dark');
            document.getElementById('themeBtn').innerHTML = '<i class="ph-fill ph-sun"></i>';
        }
        renderBudgetBreakdown();
    }

    function setBudget() {
        let b = prompt("Enter your total trip budget (₹):", tripBudget);
        if(b && !isNaN(b)) { tripBudget = parseFloat(b); saveData(); }
    }

    function toggleSidebar() {
        const sidebar = document.getElementById('itinerarySidebar');
        const overlay = document.getElementById('sidebarOverlay');
        if(sidebar.classList.contains('open')) {
            sidebar.classList.remove('open'); overlay.style.display = 'none';
        } else {
            sidebar.classList.add('open'); overlay.style.display = 'block';
        }
    }

    // ==========================================================================
    // TABS & FORM LOGIC
    // ==========================================================================
    function switchRightTab(tab) {
        document.getElementById('btn-tab-add').classList.toggle('active', tab === 'add');
        document.getElementById('btn-tab-overview').classList.toggle('active', tab === 'overview');
        document.getElementById('tab-add').classList.toggle('active', tab === 'add');
        document.getElementById('tab-overview').classList.toggle('active', tab === 'overview');
        if(tab === 'overview') renderOverview();
    }

    function toggleFree() {
        isFree = !isFree;
        const amtInput = document.getElementById('amount');
        const freeBtn = document.getElementById('btn-free');
        const paidByRow = document.getElementById('paidByRow');
        
        if (isFree) {
            amtInput.value = ''; amtInput.disabled = true; amtInput.placeholder = 'Free';
            amtInput.style.opacity = '0.5'; freeBtn.style.background = 'var(--primary)'; freeBtn.style.color = 'white';
            paidByRow.style.display = 'none';
        } else {
            amtInput.disabled = false; amtInput.placeholder = 'Amount (₹)';
            amtInput.style.opacity = '1'; freeBtn.style.background = 'rgba(16, 185, 129, 0.1)'; freeBtn.style.color = 'var(--primary)';
            paidByRow.style.display = 'flex';
        }
    }

    function renderPayers() {
        const select = document.getElementById('paidBy');
        select.innerHTML = payers.map(p => `<option value="${escapeHtml(p)}">Paid by: ${escapeHtml(p)}</option>`).join('');
    }

    function editPayers() {
        let input = prompt("Enter names separated by commas:", payers.join(', '));
        if(input !== null) {
            payers = input.split(',').map(n => n.trim()).filter(n => n !== '');
            if(payers.length === 0) payers = ['Tarun']; 
            saveData(); renderPayers(); showToast("Names updated!");
        }
    }

    // ==========================================================================
    // MULTIPLE IMAGE & OCR LOGIC
    // ==========================================================================
    function setPhotoType(type) {
        currentPhotoUploadType = type;
        document.getElementById('type-memory').classList.toggle('active', type === 'memory');
        document.getElementById('type-receipt').classList.toggle('active', type === 'receipt');
    }

    function setupPhotoHandler() {
        document.getElementById('photoInput').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas'); const MAX = 600; 
                        const scale = Math.min(MAX / img.width, MAX / img.height);
                        canvas.width = img.width * scale; canvas.height = img.height * scale;
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        currentPhotos.push({ url: canvas.toDataURL('image/jpeg', 0.6), type: currentPhotoUploadType });
                        renderPhotoPreviews();
                    }
                    img.src = event.target.result;
                }
                reader.readAsDataURL(file);
            });
            this.value = ''; 
        });
    }

    function renderPhotoPreviews() {
        const container = document.getElementById('photoPreviewContainer');
        if(currentPhotos.length === 0) { container.style.display = 'none'; return; }
        container.style.display = 'flex';
        container.innerHTML = currentPhotos.map((photo, index) => `
            <div style="position:relative; flex-shrink:0;">
                <img src="${photo.url}" style="height:70px; width:70px; border-radius:10px; object-fit:cover; border:2px solid ${photo.type==='receipt'?'var(--warning)':'var(--border)'};">
                <div onclick="removePhoto(${index})" style="position:absolute; top:-5px; right:-5px; background:var(--danger); color:white; border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; font-size:12px; cursor:pointer;">✕</div>
            </div>
        `).join('');
    }

    function removePhoto(index) { currentPhotos.splice(index, 1); renderPhotoPreviews(); }
    function viewImage(src) { document.getElementById('lbImg').src = src; document.getElementById('lightbox').style.display = 'flex'; }

    // AI OCR IMPLEMENTATION (Tesseract.js)
    function handleOCR(event) {
        const file = event.target.files[0];
        if(!file) return;
        document.getElementById('ocrLoading').style.display = 'flex';
        
        Tesseract.recognize(file, 'eng', { logger: m => {
            if(m.status === 'recognizing text') document.getElementById('ocrStatus').textContent = `Reading Receipt: ${Math.round(m.progress * 100)}%`;
        }}).then(({ data: { text } }) => {
            // Very basic regex to find the largest currency number (Total)
            const amounts = text.match(/\b\d+(\.\d{2})?\b/g);
            if(amounts) {
                const numbers = amounts.map(Number).filter(n => n > 0);
                if(numbers.length > 0) {
                    const maxAmt = Math.max(...numbers);
                    document.getElementById('amount').value = maxAmt;
                    if(isFree) toggleFree();
                    showToast(`Found Amount: ₹${maxAmt}`);
                }
            } else { showToast("Could not detect amount."); }
            
            // Auto attach as receipt
            const reader = new FileReader();
            reader.onload = e => { currentPhotos.push({ url: e.target.result, type: 'receipt' }); renderPhotoPreviews(); };
            reader.readAsDataURL(file);
            
            document.getElementById('ocrLoading').style.display = 'none';
        }).catch(err => {
            console.error(err);
            document.getElementById('ocrLoading').style.display = 'none';
            showToast("OCR Failed.");
        });
    }

    // ==========================================================================
    // UI RENDERING (Calendar, Chart, Overview, List)
    // ==========================================================================
    function renderCalendar() {
      const cal = document.getElementById('calendar');
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const startDay = new Date(currentYear, currentMonth, 1).getDay();
      document.getElementById('calendarMonth').textContent = new Date(currentYear, currentMonth, 1).toLocaleDateString('en-IN', { month: 'long', year: 'numeric' });
      
      let html = ['S', 'M', 'T', 'W', 'T', 'F', 'S'].map(d => `<div class="cal-day-header">${d}</div>`).join('');
      for (let i = 0; i < startDay; i++) html += '<div class="cal-day empty"></div>';
      
      const today = new Date();
      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const hasExp = expenses.some(e => e.date === dateStr);
        const isT = day === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear();
        const isSel = selectedDate === dateStr;
        html += `<div class="cal-day ${hasExp ? 'has-expense' : ''} ${isT ? 'today' : ''} ${isSel ? 'selected' : ''}" onclick="selectDate('${dateStr}')">${day}</div>`;
      }
      cal.innerHTML = html;
    }
    function changeMonth(delta) { currentMonth += delta; if (currentMonth === 12) { currentYear++; currentMonth = 0; } else if (currentMonth === -1) { currentYear--; currentMonth = 11; } renderCalendar(); }
    
    function selectDate(dateStr) { 
        selectedDate = selectedDate === dateStr ? null : dateStr; 
        updateHeaderTotal(); renderExpenseList(); updateMap(); renderCalendar();
    }
    
    function toggleCategoryFilter(cat) { 
        activeCategoryFilter = (activeCategoryFilter === cat) ? null : cat; 
        updateHeaderTotal(); renderExpenseList(); updateMap(); renderBudgetBreakdown();
    }

    function renderBudgetBreakdown() {
      const breakdown = {}; expenses.forEach(e => { breakdown[e.category] = (breakdown[e.category] || 0) + Number(e.amount); });
      const total = expenses.reduce((sum, e) => sum + Number(e.amount), 0);
      
      const isLight = document.body.classList.contains('light-mode');
      const textColor = isLight ? '#64748b' : '#94a3b8';

      const ctx = document.getElementById('expenseChart').getContext('2d');
      if(window.expenseChartInst) window.expenseChartInst.destroy();
      
      const labels = Object.keys(breakdown).map(k => k.split(' ')[1] || k);
      const originalLabels = Object.keys(breakdown);
      const data = Object.values(breakdown);
      const colors = ['#f59e0b', '#10b981', '#3b82f6', '#ec4899', '#8b5cf6', '#ef4444', '#0ea5e9'];

      if(total > 0) {
          window.expenseChartInst = new Chart(ctx, {
              type: 'doughnut',
              data: { labels: labels, datasets: [{ data: data, backgroundColor: colors, borderWidth: 0, hoverOffset: 4 }] },
              options: { 
                  responsive: true, maintainAspectRatio: false, cutout: '70%', 
                  plugins: { legend: { position: 'right', labels: { color: textColor, font: { family: 'Inter', size: 11 } } } },
                  onClick: (evt, elements) => {
                      if(elements.length > 0) toggleCategoryFilter(originalLabels[elements[0].index]);
                  }
              }
          });
      }

      const html = Object.entries(breakdown).sort((a, b) => b[1] - a[1]).map(([cat, amt]) => {
          const percent = total > 0 ? ((amt / total) * 100).toFixed(1) : 0;
          const isActive = activeCategoryFilter === cat ? 'active-filter' : '';
          return `<div class="budget-item ${isActive}" onclick="toggleCategoryFilter('${cat}')"><div><div class="budget-name">${cat}</div><div class="budget-percent">${percent}% of total</div></div><div class="budget-val">₹${amt.toLocaleString('en-IN')}</div></div>`;
        }).join('');
      document.getElementById('budgetBreakdownList').innerHTML = html || '<div style="text-align:center;color:var(--text-muted);font-size:0.85rem;padding:20px;">No expenses yet.</div>';
    }

    function updateHeaderTotal() {
        let filtered = expenses;
        if(activeCategoryFilter) filtered = filtered.filter(e => e.category === activeCategoryFilter);
        if(selectedDate) filtered = filtered.filter(e => e.date === selectedDate);
        
        const total = filtered.reduce((sum, e) => sum + Number(e.amount), 0);
        document.getElementById('totalSpent').textContent = `₹${total.toLocaleString('en-IN')}`;
        
        if (activeCategoryFilter || selectedDate) document.getElementById('filterLabel').innerHTML = `<span style="color:var(--warning)">Filtered Total</span>`;
        else document.getElementById('filterLabel').textContent = "Total Spent";

        // Global Budget Burn (Always total)
        const globalTotal = expenses.reduce((sum, e) => sum + Number(e.amount), 0);
        const pct = Math.min((globalTotal / tripBudget) * 100, 100).toFixed(1);
        document.getElementById('burnText').textContent = `${pct}% of ₹${tripBudget.toLocaleString('en-IN')}`;
        const bar = document.getElementById('burnBar'); bar.style.width = `${pct}%`;
        if(pct > 90) bar.style.background = '#ef4444'; else if(pct > 75) bar.style.background = '#f59e0b'; else bar.style.background = '#10b981';
    }

    function renderOverview() {
        let pStats = {};
        let rImgs = [];
        let mImgs = [];

        expenses.forEach(e => {
            if(!e.isFree && e.paidBy) {
                if(!pStats[e.paidBy]) pStats[e.paidBy] = { t:0, locs:0, cats:{} };
                pStats[e.paidBy].t += e.amount;
                pStats[e.paidBy].locs += e.place ? 1 : 0;
                pStats[e.paidBy].cats[e.category] = (pStats[e.paidBy].cats[e.category]||0) + e.amount;
            }
            if(e.photo) {
                let pArr = Array.isArray(e.photo) ? e.photo : [{url: e.photo, type: 'memory'}];
                pArr.forEach(p => {
                    if(p.type === 'receipt') rImgs.push(p.url);
                    else mImgs.push(p.url);
                });
            }
        });

        // Table
        let tableHTML = `<table class="overview-table"><tr><th>Payer</th><th>Spent</th><th>Top Category</th></tr>`;
        Object.entries(pStats).sort((a,b)=>b[1].t-a[1].t).forEach(([p, d]) => {
            let topC = Object.entries(d.cats).sort((a,b)=>b[1]-a[1])[0][0].split(' ')[1];
            tableHTML += `<tr><td><strong>${p}</strong></td><td style="color:var(--danger);font-weight:bold;">₹${d.t.toLocaleString()}</td><td>${topC}</td></tr>`;
        });
        tableHTML += `</table>`;
        document.getElementById('overviewTableContainer').innerHTML = tableHTML;

        // Carousels
        const buildC = (arr) => arr.map(u => `<div class="carousel-item" onclick="viewImage('${u}')"><img src="${u}"></div>`).join('');
        document.getElementById('receiptCarousel').innerHTML = rImgs.length ? buildC(rImgs) : `<div style="color:var(--text-muted);font-size:0.8rem;">No receipts scanned.</div>`;
        document.getElementById('memoryCarousel').innerHTML = mImgs.length ? buildC(mImgs) : `<div style="color:var(--text-muted);font-size:0.8rem;">No memories attached.</div>`;
    }

    function renderAll() { 
        try { 
            renderCalendar(); renderBudgetBreakdown(); renderExpenseList(); updateHeaderTotal(); updateMap();
            if(document.getElementById('tab-overview').classList.contains('active')) renderOverview();
        } 
        catch (e) { console.error("Render error", e); }
    }

    // ==========================================================================
    // MAP SYSTEM: CIRCLE PINS, CLUSTERS, HEATMAP
    // ==========================================================================
    function initMap() {
      map = L.map('map', { zoomControl: false }).setView([15.2993, 74.1240], 10);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM', maxZoom: 19 }).addTo(map);
      L.control.zoom({ position: 'bottomright' }).addTo(map);
      markersCluster = L.markerClusterGroup({
          iconCreateFunction: function(cluster) {
              return L.divIcon({ html: `<div style="background:var(--ocean); color:white; width:30px; height:30px; display:flex; align-items:center; justify-content:center; border-radius:50%; font-weight:bold; box-shadow: 0 0 10px rgba(0,0,0,0.5);">${cluster.getChildCount()}</div>`, className: '', iconSize: [30, 30] });
          }
      });
      map.addLayer(markersCluster);
    }

    function toggleHeatmap() {
        isHeatmap = !isHeatmap;
        document.getElementById('btn-heatmap').classList.toggle('active', isHeatmap);
        updateMap();
    }

    function updateMap() {
      if (!map) return;
      markersCluster.clearLayers();
      if(heatLayer) { map.removeLayer(heatLayer); heatLayer = null; }
      if(routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
      
      let filtered = expenses;
      if(activeCategoryFilter) filtered = filtered.filter(e => e.category === activeCategoryFilter);
      if(selectedDate) filtered = filtered.filter(e => e.date === selectedDate);

      const placesLoc = filtered.filter(e => e.locationData && typeof e.locationData.lat === 'number').sort((a, b) => new Date(`${a.date}T${a.time||'00:00'}`) - new Date(`${b.date}T${b.time||'00:00'}`));
      
      if(isHeatmap && placesLoc.length > 0) {
          let heatPoints = placesLoc.map(p => [p.locationData.lat, p.locationData.lon, (p.amount || 100) / 100]);
          heatLayer = L.heatLayer(heatPoints, {radius: 25, blur: 15, maxZoom: 17}).addTo(map);
          document.getElementById('totalDistance').textContent = "Heatmap View";
          return; // Skip drawing pins and lines in heatmap mode
      }

      let latlngs = [];

      placesLoc.forEach((exp, index) => {
        latlngs.push([exp.locationData.lat, exp.locationData.lon]);
        
        // Dynamic Pin Styling based on Spends
        let color = '#10b981'; // Green < 500
        if(exp.amount >= 500 && exp.amount <= 1500) color = '#f59e0b'; // Yellow
        if(exp.amount > 1500) color = '#ef4444'; // Red
        if(exp.isFree) color = '#3b82f6'; // Blue for free
        
        let radius = 8 + (Math.min(exp.amount, 5000) / 1000); // Scale size

        const marker = L.circleMarker([exp.locationData.lat, exp.locationData.lon], {
            radius: radius, fillColor: color, color: '#ffffff', weight: 2, opacity: 1, fillOpacity: 0.9
        });

        // Popup logic
        let pHTML = '';
        if(exp.photo) {
            let pArr = Array.isArray(exp.photo) ? exp.photo : [{url: exp.photo}];
            pHTML = `<img src="${pArr[0].url}" style="width:100%; height:80px; object-fit:cover; border-radius:8px; margin-bottom:8px;">`;
        }
        const badgeAmt = (exp.isFree || exp.amount === 0) ? '<span style="color:var(--primary);font-weight:900;">FREE</span>' : `₹${Number(exp.amount).toLocaleString()}`;
        
        marker.bindPopup(`
            <div style="min-width:180px; font-family:'Inter';">
              ${pHTML}
              <div style="font-size:0.7rem; font-weight:800; color:#0ea5e9; text-transform:uppercase;">Stop ${index + 1}</div>
              <b style="color:#1e293b; font-size:1rem;">${escapeHtml(exp.description)}</b><br>
              <span style="color:#ef4444; font-weight:800; font-family:'JetBrains Mono'; font-size:1.1rem;">${badgeAmt}</span><br>
              <span style="color:#64748b; font-size:0.75rem;">${(exp.category||'').split(' ')[0]}</span>
            </div>
        `);
        marker.bindTooltip(`<b>${escapeHtml(exp.description)}</b>`, {className: 'custom-tooltip'});
        markersCluster.addLayer(marker);
      });

      // Draw dashed route line
      if (placesLoc.length > 1) {
          routeLayer = L.polyline(latlngs, {color: 'var(--ocean)', weight: 3, dashArray: '6, 8', opacity: 0.6}).addTo(map);
          let dist = 0; for(let i=1; i<latlngs.length; i++) dist += map.distance(L.latLng(latlngs[i-1]), L.latLng(latlngs[i]));
          document.getElementById('totalDistance').textContent = (dist / 1000).toFixed(1) + ' km';
      } else {
          document.getElementById('totalDistance').textContent = '0 km';
      }

      if (placesLoc.length > 1 && !isReplaying) {
          try { map.fitBounds(L.featureGroup(latlngs.map(ll => L.marker(ll))).getBounds().pad(0.2), { maxZoom: 16 }); } catch(e){}
      } else if (placesLoc.length === 1 && !isReplaying) {
          map.setView(latlngs[0], 15);
      }
    }

    function flyToMap(lat, lng) { 
        if(!map) return;
        if(window.innerWidth <= 1024) toggleSidebar();
        map.flyTo([lat, lng], 17, { animate: true, duration: 1.5 }); 
    }

    function exportMap() {
        showToast("📸 Capturing Map Snapshot...");
        html2canvas(document.getElementById("map-wrapper"), {useCORS: true}).then(canvas => {
            const link = document.createElement('a');
            link.download = `Goa-Map-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            showToast("✅ Snapshot Saved!");
        });
    }

    // ==========================================================================
    // CRUD: FORM & FEED
    // ==========================================================================
    function addExpense() {
      let desc = document.getElementById('description').value.trim();
      let amtRaw = document.getElementById('amount').value;
      const amount = isFree ? 0 : (parseFloat(amtRaw) || 0);
      const category = document.getElementById('category').value;
      const timeVal = document.getElementById('timeInput').value;
      const place = document.getElementById('place').value.trim();
      const dateVal = document.getElementById('dateInput').value || new Date().toISOString().split('T')[0];
      const paidBy = document.getElementById('paidBy').value.trim();

      if (!isFree && amtRaw === '') return showToast('Please fill Amount!');
      if (!category) return showToast('Please select a Category!');
      if(!desc) { let cleanCat = category.split(' ').slice(1).join(' '); desc = `${cleanCat}${timeVal ? ` at ${tConvert(timeVal)}` : ''}`; }

      const expData = { 
          date: dateVal, time: timeVal, description: desc, amount: amount, 
          category: category, place: place, paidBy: isFree ? null : paidBy, isFree: isFree,
          locationData: selectedLocation, photo: currentPhotos.length > 0 ? [...currentPhotos] : null 
      };

      if(editingId) {
          const idx = expenses.findIndex(e => e.id === editingId);
          if(idx !== -1) expenses[idx] = { ...expenses[idx], ...expData };
          editingId = null; document.getElementById('saveBtn').textContent = 'Save to Itinerary'; showToast('Updated & Synced! ✓');
      } else { expData.id = Date.now(); expenses.unshift(expData); showToast('Saved & Synced! ✓'); }

      saveData();
      
      if (isFree) toggleFree();
      document.getElementById('description').value = ''; document.getElementById('amount').value = ''; document.getElementById('category').value = ''; document.getElementById('place').value = ''; 
      
      selectedLocation = null; 
      currentPhotos = []; renderPhotoPreviews(); document.getElementById('photoInput').value = '';
      if(tempMarker) { map.removeLayer(tempMarker); tempMarker = null; }
    }

    function triggerEdit(id) {
        const exp = expenses.find(e => e.id === id); if(!exp) return;
        
        if (exp.isFree) { if (!isFree) toggleFree(); } 
        else { if (isFree) toggleFree(); document.getElementById('amount').value = exp.amount; }

        document.getElementById('description').value = exp.description; document.getElementById('category').value = exp.category; document.getElementById('place').value = exp.place || ''; 
        if(exp.paidBy && !payers.includes(exp.paidBy)) { payers.push(exp.paidBy); renderPayers(); }
        document.getElementById('paidBy').value = exp.paidBy || 'Tarun';
        if(exp.time) document.getElementById('timeInput').value = exp.time;
        if(exp.date) document.getElementById('dateInput').value = exp.date;
        
        selectedLocation = exp.locationData || null; 
        currentPhotos = exp.photo ? (Array.isArray(exp.photo) ? [...exp.photo] : [{url: exp.photo, type: 'memory'}]) : [];
        renderPhotoPreviews();

        editingId = id; document.getElementById('saveBtn').textContent = 'Update Memory'; showToast('Editing mode active');
        if(document.getElementById('itinerarySidebar').classList.contains('open')) toggleSidebar();
        switchRightTab('add');
    }

    function renderExpenseList() {
      let filtered = expenses;
      if(activeCategoryFilter) filtered = filtered.filter(e => e.category === activeCategoryFilter);
      if(selectedDate) filtered = filtered.filter(e => e.date === selectedDate);

      const html = filtered.map(e => {
        let locHTML = (e.locationData && e.locationData.lat) ? `<button onclick="flyToMap(${e.locationData.lat}, ${e.locationData.lon})" class="locate-btn"><i class="ph-bold ph-map-pin"></i> Locate Map</button>` : `<span style="font-size:0.75rem;color:var(--text-muted);"><i class="ph-bold ph-map-pin"></i> ${escapeHtml(e.place)}</span>`; 
        
        let photoHTML = '';
        if (e.photo) {
            let pArr = Array.isArray(e.photo) ? e.photo : [{url: e.photo, type: 'memory'}];
            if(pArr.length > 0) {
                photoHTML = `<div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px;">` + 
                    pArr.map(p => `<img src="${p.url}" class="photo-thumb" style="border-color:${p.type==='receipt'?'var(--warning)':'var(--border)'};" onclick="viewImage('${p.url}')">`).join('') + `</div>`;
            }
        }
        const badgeAmt = (e.isFree || e.amount === 0) ? '<span style="color:var(--primary); font-size:1.1rem; font-weight:900;">FREE</span>' : `₹${Number(e.amount).toLocaleString('en-IN')}`;

        return `<div class="expense-item" id="item-${e.id}" onclick="if(event.target.tagName !== 'BUTTON' && event.target.tagName !== 'IMG') { flyToMap(${e.locationData?.lat||0}, ${e.locationData?.lon||0}); }">
          <div class="exp-top">
             <div style="flex:1; min-width:0;">
                 ${photoHTML}
                 <div class="exp-title">${escapeHtml(e.description)}</div>
                 <div class="exp-meta">
                    <span><i class="ph-bold ph-calendar-blank"></i> ${formatDate(e.date)} ${e.time ? `• 🕒 ${tConvert(e.time)}` : ''}</span>
                    ${(e.paidBy && !e.isFree) ? `<span style="color:var(--ocean);font-weight:700;"><i class="ph-bold ph-wallet"></i> Paid by: ${escapeHtml(e.paidBy)}</span>` : ''}
                 </div>
             </div>
             <div style="text-align:right; flex-shrink:0;">
                 <div class="exp-amt">${badgeAmt}</div>
                 <div><div class="exp-cat">${(e.category||'').split(' ')[0]}</div></div>
             </div>
          </div>
          <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--border); padding-top:12px; margin-top:4px;"><div>${locHTML}</div><div class="feed-actions"><button class="action-btn btn-edit" onclick="triggerEdit(${e.id})"><i class="ph-bold ph-pencil-simple"></i> Edit</button><button class="action-btn btn-del" onclick="deleteExpense(${e.id})"><i class="ph-bold ph-trash"></i></button></div></div>
        </div>`;
      }).join('');
      document.getElementById('expenseList').innerHTML = html || '<p style="text-align:center;color:var(--text-muted);padding:40px;font-size:0.9rem;">No memories logged yet.</p>';
    }

    function deleteExpense(id) { 
        if (confirm('Delete this memory?')) { 
            expenses = expenses.filter(e => e.id !== id); 
            if(editingId === id) { editingId = null; document.getElementById('saveBtn').textContent = 'Save to Itinerary'; if(isFree) toggleFree(); } 
            saveData(); showToast('Deleted & Synced.'); 
        } 
    }

    // ==========================================================================
    // MANUAL PINNING & LOCATION
    // ==========================================================================
    function enableManualPin() {
        manualPinMode = true; showToast("📍 Click map to pin!");
        document.getElementById('map').classList.add('map-pin-mode');
        map.off('click', handleMapClick); map.once('click', handleMapClick);
    }
    function handleMapClick(e) {
        if(!manualPinMode) return;
        const lat = e.latlng.lat; const lon = e.latlng.lng;
        if(tempMarker) map.removeLayer(tempMarker);
        tempMarker = L.marker([lat, lon]).addTo(map).bindPopup("<b style='font-family:Inter;'>📍 Pinned!</b>").openPopup();
        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`).then(r => r.json()).then(data => selectLocation(data.display_name ? data.display_name.split(',')[0] : `Map Pin`, lat, lon, null)).catch(() => selectLocation(`Map Pin`, lat, lon, null));
        manualPinMode = false; document.getElementById('map').classList.remove('map-pin-mode');
    }
    function pinCurrentLocation() {
        showToast("Requesting GPS...");
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude, lon = pos.coords.longitude;
                fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`).then(r => r.json()).then(data => {
                    selectLocation(data.display_name ? data.display_name.split(',')[0] : `Live GPS Pin`, lat, lon, null);
                    if(tempMarker) map.removeLayer(tempMarker);
                    tempMarker = L.marker([lat, lon]).addTo(map).bindPopup("<b style='font-family:Inter;'>📍 You are here</b>").openPopup();
                    map.flyTo([lat, lon], 16);
                }).catch(() => selectLocation(`Live Pin`, lat, lon, null));
            }, () => showToast("GPS Error: You must click 'Allow'."));
        } else { showToast("GPS not supported."); }
    }
    function searchLocation(query) {
      clearTimeout(searchTimeout); const sug = document.getElementById('locationSuggestions');
      if (!query || query.length < 2) { sug.style.display = 'none'; return; }
      sug.innerHTML = '<div style="padding: 12px; color: var(--text-muted); font-size:0.85rem;">🔍 Searching...</div>'; sug.style.display = 'block';
      searchTimeout = setTimeout(() => {
        fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query + ', Goa, India')}&format=json&limit=5`).then(r => r.json()).then(results => {
            if (results.length === 0) { sug.innerHTML = '<div style="padding: 12px; font-size:0.85rem;">No locations found.</div>'; return; }
            sug.innerHTML = results.map(place => {
              const shortName = place.display_name.split(',')[0];
              const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${place.lat},${place.lon}`;
              return `<div style="padding: 12px; cursor: pointer; border-bottom: 1px solid var(--border);" onmouseover="this.style.background='var(--ocean)'; this.style.color='white';" onmouseout="this.style.background='transparent'; this.style.color='inherit';" onclick="selectLocation('${escapeHtml(place.display_name)}', ${place.lat}, ${place.lon}, '${mapsUrl.replace(/'/g, "\\'")}')"><div style="font-weight: 700; font-size: 0.9rem;"><i class="ph-bold ph-map-pin"></i> ${escapeHtml(shortName)}</div><div style="font-size: 0.75rem; opacity:0.8; margin-top:4px;">${escapeHtml(place.display_name)}</div></div>`;
            }).join('');
          }).catch(() => { sug.innerHTML = '<div style="padding: 12px; color: var(--danger); font-size:0.85rem;">Error searching.</div>'; });
      }, 400);
    }
    function selectLocation(name, lat, lon, mapsUrl) {
      const shortName = name.split(',')[0]; document.getElementById('place').value = shortName;
      selectedLocation = { name: shortName, fullName: name, lat: lat, lon: lon, mapsUrl: mapsUrl || `https://www.google.com/maps/search/?api=1&query=${lat},${lon}` };
      document.getElementById('locationSuggestions').style.display = 'none'; showToast(`📍 Selected: ${shortName}`);
    }

    // ==========================================================================
    // EXPORTS & UTILS
    // ==========================================================================
    function escapeHtml(t) { if(!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    function formatDate(d) { return new Date(d).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }); }
    function clearAll() { if (confirm('⚠️ Delete ALL data? Cannot be undone!')) { expenses = []; saveData(); init(); showToast('Cleared!'); } }
    function showToast(msg) { const toast = document.getElementById('toast'); document.getElementById('toastMsg').textContent = msg; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2500); }

    function exportData() {
      const csv = [['Date', 'Time', 'Description', 'Amount', 'Category', 'Place', 'Paid By'],
        ...expenses.map(e => [e.date, e.time||'', e.description, e.isFree ? 0 : e.amount, e.category, e.place||'', e.isFree ? 'Free' : (e.paidBy||'')])
      ].map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = `goa-expenses.csv`; a.click(); showToast('CSV exported!');
    }
    function downloadPlacesList() {
      const placeStats = {}; expenses.forEach(e => { if (e.place) { if (!placeStats[e.place]) placeStats[e.place] = { count: 0, total: 0, locationData: e.locationData }; placeStats[e.place].count++; placeStats[e.place].total += Number(e.amount); } });
      if(Object.keys(placeStats).length === 0) return showToast("No places added yet!");
      const htmlContent = `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Goa Places Guide</title><style>body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background: #f0f9ff; } .place-card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 16px; border-left: 4px solid #0ea5e9; box-shadow: 0 4px 10px rgba(0,0,0,0.05);} .btn { background:#0ea5e9; color:white; padding:8px 16px; border-radius:8px; text-decoration:none; font-weight:bold; display:inline-block; margin-top:10px;}</style></head><body><h1>📍 Goa Places Guide</h1>${Object.entries(placeStats).sort((a,b)=>b[1].total-a[1].total).map(([place, stats]) => { const mUrl = stats.locationData ? stats.locationData.mapsUrl : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(place + ', Goa')}`; return `<div class="place-card"><h2>${place}</h2><p>Visits: ${stats.count} | Spent: ₹${stats.total.toLocaleString('en-IN')}</p><a href="${mUrl}" target="_blank" class="btn">Open in Maps</a></div>`; }).join('')}</body></html>`;
      const blob = new Blob([htmlContent], { type: 'text/html' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = `goa-places.html`; a.click(); showToast('Places list downloaded!');
    }
    function exportHTML() {
      const total = expenses.reduce((sum, e) => sum + Number(e.amount), 0);
      const htmlContent = `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Goa Trip Report</title><style>body { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; background: #f8fafc; } .header { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; padding: 30px; border-radius: 16px; text-align: center; margin-bottom: 30px; } table { width: 100%; border-collapse: collapse; background:white; } th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; } th { background: #f1f5f9; font-weight: 700; }</style></head><body><div class="header"><h1>🏖️ Goa Trip Expense Report</h1><p>Total Spent: ₹${total.toLocaleString('en-IN')}</p></div><table><thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Amount</th></tr></thead><tbody>${expenses.map(e => `<tr><td>${e.date}</td><td><strong>${e.description}</strong></td><td>${e.category}</td><td style="color:#ef4444;font-weight:bold;">₹${Number(e.amount).toLocaleString('en-IN')}</td></tr>`).join('')}</tbody></table></body></html>`;
      const blob = new Blob([htmlContent], { type: 'text/html' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = `goa-report.html`; a.click(); showToast('HTML report exported!');
    }
    function exportStory() {
        if(expenses.length === 0) return showToast("Add expenses first!");
        const total = expenses.reduce((s, e) => s + Number(e.amount), 0);
        const topCat = Object.entries(expenses.reduce((acc, e) => { acc[e.category] = (acc[e.category]||0) + Number(e.amount); return acc; }, {})).sort((a,b)=>b[1]-a[1])[0][0];
        const storyHTML = `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet"><style>body{font-family:'Plus Jakarta Sans';background:#0f172a;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;}.card{background:linear-gradient(135deg,#0ea5e9,#f43f5e);width:350px;padding:40px 30px;border-radius:30px;color:white;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,0.5);position:relative;overflow:hidden;}.card::before{content:'🌴';font-size:150px;position:absolute;opacity:0.1;top:-20px;left:-20px;}h1{font-size:2.5rem;margin:0 0 10px 0;line-height:1.1;font-weight:800;}p{font-size:1rem;opacity:0.9;margin-bottom:30px;}.metric{background:rgba(0,0,0,0.2);padding:15px;border-radius:15px;margin-bottom:15px;text-align:left;display:flex;justify-content:space-between;align-items:center;}.m-label{font-size:0.8rem;text-transform:uppercase;letter-spacing:1px;opacity:0.8;}.m-val{font-size:1.4rem;font-weight:800;}</style></head><body><div class="card"><h1>My Goa<br>Journey</h1><p>Trip Summary.</p><div class="metric"><div class="m-label">Total Splurge</div><div class="m-val">₹${total.toLocaleString('en-IN')}</div></div><div class="metric"><div class="m-label">Top Category</div><div class="m-val">${topCat.substring(topCat.indexOf(' ')+1)}</div></div></div></body></html>`;
        const blob = new Blob([storyHTML], { type: 'text/html' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `goa-story.html`; a.click(); showToast('📸 Story generated!');
    }

    document.addEventListener('click', (e) => { const sug = document.getElementById('locationSuggestions'); if (e.target !== document.getElementById('place') && e.target !== sug) sug.style.display = 'none'; });
    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
